version: "3.9"

services:
  web:
    build: .
    image: bangalore-price-predictor:latest
    container_name: house-price-app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: house-predictor-net
